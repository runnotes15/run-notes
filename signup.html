<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | RUNnotes</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ── THEME VARIABLES (Consistent with Landing Page) ── */
    :root {
      --brand-red: #e02030;
      --brand-red-hover: #ff3b4a;
      --deep-navy: #050a1f;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.05);
      --text-primary: #ffffff;
      --text-secondary: #b0b8d1;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--deep-navy);
      background: 
        radial-gradient(circle at 0% 0%, rgba(224, 32, 48, 0.12) 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, rgba(58, 111, 223, 0.08) 0%, transparent 35%),
        var(--deep-navy);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── AUTH CARD (The Glass Container) ── */
    .auth-container {
      width: 100%;
      max-width: 440px;
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--brand-red); }

    h2 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }

    p.subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      text-align: center;
      margin-bottom: 32px;
    }

    /* ── FORM ELEMENTS ── */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      transition: var(--transition);
      outline: none;
    }

    input:focus {
      border-color: var(--brand-red);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(224, 32, 48, 0.15);
    }

    /* ── ACTION BUTTON ── */
    .btn-submit {
      width: 100%;
      background: var(--brand-red);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(224, 32, 48, 0.3);
    }

    .btn-submit:hover {
      background: var(--brand-red-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(224, 32, 48, 0.4);
    }

    /* ── FOOTER LINKS ── */
    .auth-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--brand-red);
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Responsive Mobile */
    @media (max-width: 480px) {
      .auth-container {
        padding: 30px 20px;
        margin: 15px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="logo">run<span>notes.</span></div>
    
    <h2>Create Account</h2>
    <p class="subtitle">Join thousands of students excelling in engineering.</p>

    <form id="signupForm">
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="e.g. John Doe" required>
      </div>

      <div class="form-group">
        <label for="email">University Email</label>
        <input type="email" id="email" placeholder="name@student.run.edu.ng" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit">Sign Up</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // Logic for Firebase/Auth goes here
      console.log("Redirecting to verification...");
    });
  </script>

</body>
</html>
