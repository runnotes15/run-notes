<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNnotes | Student Contribution</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050a30; 
            --accent: #e02030; 
            --gold: #ffc107; 
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(255, 255, 255, 0.12); 
            --white: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(224, 32, 48, 0.15) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, rgba(255, 193, 7, 0.05) 0%, transparent 35%); 
            color: var(--white); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .upload-container { width: 100%; max-width: 500px; animation: fadeIn 0.8s ease-out; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--gold); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; margin-top: 5px; }

        .glass-card { 
            background: var(--glass); 
            padding: 35px; 
            border-radius: 28px; 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group { margin-bottom: 18px; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row .form-group { flex: 1; }

        label { 
            display: block; 
            font-size: 0.65rem; 
            color: rgba(255,255,255,0.6); 
            margin-bottom: 8px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            padding-left: 5px;
        }

        input, select { 
            width: 100%; 
            padding: 14px 16px; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--glass-border); 
            border-radius: 14px; 
            color: white; 
            outline: none; 
            transition: all 0.3s ease; 
            font-size: 0.9rem; 
        }

        input:focus, select:focus { 
            border-color: var(--accent); 
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 0 4px rgba(224, 32, 48, 0.1);
        }

        input[type="file"] {
            padding: 10px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-publish { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-weight: 800; 
            font-size: 1rem;
            cursor: pointer; 
            margin-top: 15px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-publish:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(224, 32, 48, 0.4); 
            filter: brightness(1.1);
        }

        .btn-publish:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .status-area {
            margin-top: 20px;
            text-align: center;
            min-height: 24px;
        }

        .success-msg { 
            display: none; 
            color: #4ade80; 
            font-size: 0.85rem; 
            font-weight: 600; 
            animation: slideUp 0.4s ease;
        }

        .error-msg {
            display: none;
            color: #ff4d4d;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Progress Bar Styles */
        .progress-container {
            display: none;
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="header">
            <h1>RUN<span>notes</span></h1>
            <p>Contribution Portal</p>
        </div>
        <div class="glass-card">
            <form id="studentUploadForm">
                <div class="form-group">
                    <label><i class="fas fa-barcode"></i> Course CodInie</label>
                    <input type="text" id="courseCode" placeholder="e.g., CPE 307" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-book"></i> Course Title</label>
                    <input type="text" id="courseTitle" placeholder="Auto-fills on Code entry..." required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-university"></i> Department</label>
                    <select id="dept">
                        <option>Computer Engineering</option>
                        <option>Electrical Engineering</option>
                        <option>Civil Engineering</option>
                        <option>Mechanical Engineering</option>
                    </select>
                </div>
                <div class="flex-row">
                    <div class="form-group">
                        <label>Level</label>
                        <select id="level">
                            <option value="100">100</option>
                            <option value="200">200</option>
                            <option value="300">300</option>
                            <option value="400">400</option>
                            <option value="500">500</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Semester</label>
                        <select id="sem">
                            <option value="1">1st</option>
                            <option value="2">2nd</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Resource Type</label>
                    <select id="type">
                        <option value="note">Lecture Note</option>
                        <option value="pq">Past Question</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-file-upload"></i> Select File (PDF/JPG)</label>
                    <input type="file" id="fileUpload" accept=".pdf,.jpg,.png,.jpeg" required>
                </div>
                
                <div class="progress-container" id="progCont">
                    <div class="progress-bar" id="progBar"></div>
                </div>

                <button type="submit" class="btn-publish" id="submitBtn">
                    <i class="fas fa-cloud-upload-alt"></i> UPLOAD TO LIBRARY
                </button>

                <div class="status-area">
                    <p class="success-msg" id="success"><i class="fas fa-check-circle"></i> Sent to Admin for approval!</p>
                    <p class="error-msg" id="error"><i class="fas fa-exclamation-circle"></i> Upload failed. Try again.</p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- 1. SUPABASE CONFIGURATION ---
        const SUPABASE_URL = "https://fnsqjuczwqddatrkvffk.supabase.co";
        const SUPABASE_KEY = "sb_publishable_2zyetrB8vPucTpYziINyxw_RfwrJuF_"; // Use Anon Key
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. CURRICULUM DATA ---
        const curriculum = {
            "GST 107": { title: "Science, Technology & Health Studies", level: "100", sem: "1" },
            "CPE 307": { title: "Assembly Language Programming", level: "300", sem: "1" },
            "GET 304": { title: "Technical Writing & Communication", level: "300", sem: "2" },
            "CPE 304": { title: "Operating System Principles", level: "300", sem: "2" },
            "CPE 302": { title: "Measurement and Instrumentation", level: "300", sem: "2" },
            // ... (Your existing curriculum data is preserved internally)
        };

        // UI Logic: Auto-fill
        document.getElementById('courseCode').addEventListener('input', function() {
            const code = this.value.toUpperCase().trim();
            if (curriculum[code]) {
                document.getElementById('courseTitle').value = curriculum[code].title;
                document.getElementById('level').value = curriculum[code].level;
                document.getElementById('sem').value = curriculum[code].sem;
            }
        });

        // --- 3. UPLOAD LOGIC ---
        document.getElementById('studentUploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('success');
            const errorMsg = document.getElementById('error');
            const progCont = document.getElementById('progCont');
            const progBar = document.getElementById('progBar');
            const file = document.getElementById('fileUpload').files[0];

            // Reset UI
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESSING...';
            errorMsg.style.display = "none";
            successMsg.style.display = "none";
            progCont.style.display = "block";
            progBar.style.width = "30%";

            try {
                // Step A: Upload File to Storage
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const filePath = `uploads/${fileName}`;

                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('note-files') // Bucket must be named 'note-files'
                    .upload(filePath, file);

                if (uploadError) throw uploadError;
                progBar.style.width = "70%";

                // Step B: Get Public URL
                const { data: urlData } = _supabase.storage
                    .from('note-files')
                    .getPublicUrl(filePath);

                const fileUrl = urlData.publicUrl;

                // Step C: Insert into Submissions Table
                const { error: dbError } = await _supabase
                    .from('submissions')
                    .insert([{
                        course_code: document.getElementById('courseCode').value.toUpperCase(),
                        course_title: document.getElementById('courseTitle').value,
                        department: document.getElementById('dept').value,
                        level: document.getElementById('level').value,
                        semester: document.getElementById('sem').value,
                        resource_type: document.getElementById('type').value,
                        file_url: fileUrl,
                        is_approved: false
                    }]);

                if (dbError) throw dbError;

                // Final Success
                progBar.style.width = "100%";
                successMsg.style.display = "block";
                this.reset();
                setTimeout(() => { 
                    progCont.style.display = "none";
                    progBar.style.width = "0%";
                }, 3000);

            } catch (err) {
                console.error(err);
                errorMsg.innerText = "Error: " + (err.message || "Something went wrong");
                errorMsg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> UPLOAD TO LIBRARY';
            }
        });
    </script>
</body>
</html>
