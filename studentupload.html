<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNnotes | Student Contribution</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050a30; 
            --accent: #e02030; 
            --gold: #ffc107; 
            --glass: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.1); 
            --white: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background-color: var(--bg); 
            background-image: radial-gradient(circle at 100% 0%, rgba(224, 32, 48, 0.1) 0%, transparent 40%); 
            color: var(--white); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            
        }

        .upload-container { width: 100%; max-width: 550px; animation: fadeIn 0.8s ease-out; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; font-weight: 800; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--gold); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; }

        .glass-card { 
            background: var(--glass); 
            padding: 40px; 
            border-radius: 24px; 
            backdrop-filter: blur(15px); 
            margin-left: -20px;
            margin-right: -20px;
        }

        .form-group { margin-bottom: 20px; }
        .flex-row { display: flex; gap: 15px; }
        .flex-row .form-group { flex: 1; }

        label { 
            display: block; 
            font-size: 0.7rem; 
            color: #b0bec5; 
            margin-bottom: 8px; 
            font-weight: 700; 
            text-transform: uppercase; 
        }

        input, select { 
            width: 100%; 
            padding: 14px; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid var(--glass-border); 
            border-radius: 12px; 
            color: white; 
            outline: none; 
            transition: 0.3s; 
            font-size: 0.9rem; 
        }

        input:focus { border-color: var(--accent); }

        .btn-publish { 
            width: 100%; 
            padding: 16px; 
            background: var(--accent); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: 0.3s; 
        }

        .btn-publish:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(224, 32, 48, 0.4); 
        }

        .success-msg { 
            display: none; 
            color: #4ade80; 
            text-align: center; 
            margin-top: 20px; 
            font-size: 0.85rem; 
            font-weight: 600; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="header">
            <h1>RUN<span>notes</span></h1>
            <p>Student Contribution Portal</p>
        </div>
        <div class="glass-card">
            <form id="studentUploadForm">
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" id="courseCode" placeholder="e.g., GST 107" required>
                </div>
                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text" id="courseTitle" placeholder="Auto-fills on Code entry..." required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="dept">
                        <option>Computer Engineering</option>
                        <option>Electrical Engineering</option>
                        <option>Civil Engineering</option>
                        <option>Mechanical Engineering</option>
                    </select>
                </div>
                <div class="flex-row">
                    <div class="form-group">
                        <label>Level</label>
                        <select id="level">
                            <option value="100">100</option>
                            <option value="200">200</option>
                            <option value="300">300</option>
                            <option value="400">400</option>
                            <option value="500">500</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Semester</label>
                        <select id="sem">
                            <option value="1">1st</option>
                            <option value="2">2nd</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Resource Type</label>
                    <select id="type">
                        <option value="note">Lecture Note</option>
                        <option value="pq">Past Question</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select File</label>
                    <input type="file" id="fileUpload" accept=".pdf,.jpg,.png,.jpeg" required>
                </div>
                <button type="submit" class="btn-publish">UPLOAD TO LIBRARY</button>
                <p class="success-msg" id="success">Upload successful! Synced with database.</p>
            </form>
        </div>
    </div>

    <script>

            "EEE 321": { title: "Analogue Electronic Circuits I", level: "300", sem: "1" },

            // --- 300 LEVEL: SECOND SEMESTER ---
            "TVET 342": { title: "Network System Installation", level: "300", sem: "2" },

            "GET 304": { title: "Technical Writing & Communication", level: "300", sem: "2" },
            "CPE 304": { title: "Operating System Principles", level: "300", sem: "2" },
            "GET 302": { title: "Engineering Mathematics IV", level: "300", sem: "2" },
            "FIC 302": { title: "Special Topics on Relationships and Family", level: "300", sem: "2" },
            "GST 312": { title: "Peace and Conflict Resolution", level: "300", sem: "2" },
            "ENT 312": { title: "Venture Creation", level: "300", sem: "2" },
            "CPE 302": { title: "Measurement and Instrumentation", level: "300", sem: "2" },
            "EEE 322": { title: "Digital Electronic Circuits", level: "300", sem: "2" }
        };

        // Helper: Convert string to Title Case
        function toTitleCase(str) {
            return str.toLowerCase().split(' ').map(word => 
                word.charAt(0).toUpperCase() + word.slice(1)
            ).join(' ');
        }

        // DOM Elements
        const codeInput = document.getElementById('courseCode');
        const titleInput = document.getElementById('courseTitle');
        const levelSelect = document.getElementById('level');
        const semSelect = document.getElementById('sem');

        // Logic: Auto-fill based on Course Code
        codeInput.addEventListener('input', function() {
            const enteredCode = this.value.toUpperCase().trim();
            const courseData = curriculum[enteredCode];

            if (courseData) {
                titleInput.value = toTitleCase(courseData.title);
                levelSelect.value = courseData.level;
                semSelect.value = courseData.sem;
                
                // Visual feedback
                titleInput.style.borderColor = "#ffc107";
                setTimeout(() => { titleInput.style.borderColor = "rgba(255, 255, 255, 0.1)"; }, 1000);
            }
        });

        // Logic: Form Submission
        document.getElementById('studentUploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-publish');
            const successMsg = document.getElementById('success');

            btn.innerText = "UPLOADING TO CLOUD...";
            btn.disabled = true;

            // Simulate server upload
            setTimeout(() => {
                btn.innerText = "UPLOAD TO LIBRARY";
                btn.disabled = false;
                successMsg.style.display = "block";
                this.reset();
                setTimeout(() => { successMsg.style.display = "none"; }, 4000);
            }, 2000);
        });
    </script>
</body>
</html>
