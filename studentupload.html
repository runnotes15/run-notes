<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNnotes | Elite Student Resource Portal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050a18;
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-gold: #fbbf24;
            --c-blue: #2563eb;
            --c-green: #10b981;
            --c-orange: #f59e0b;
            --c-red: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg-body); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden; 
            width: 100%;
        }

        /* --- NAVIGATION --- */
        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 1rem 5%; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand-icon { background: var(--bg-deep); color: var(--accent-gold); width: 40px; height: 40px; display: grid; place-items: center; border-radius: 10px; }
        .brand-name { font-weight: 800; font-size: 1.4rem; color: var(--bg-deep); letter-spacing: -0.5px; }

        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; transition: var(--transition); }
        .nav-links a:hover { color: var(--c-blue); }
        .cta-nav { background: var(--bg-deep); color: white !important; padding: 10px 20px; border-radius: 50px; }

        /* --- HERO SECTION --- */
        .hero { padding: 80px 5%; text-align: center; background: radial-gradient(circle at top right, #eef2ff, #f8fafc); }
        .hero-content { max-width: 1000px; margin: 0 auto; }
        .badge { background: #e0e7ff; color: var(--c-blue); padding: 6px 16px; border-radius: 100px; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 20px; display: inline-block; }
        .main-title { font-size: clamp(2rem, 8vw, 4rem); font-weight: 800; color: var(--bg-deep); line-height: 1.1; margin-bottom: 20px; }
        .sub-text { color: var(--text-muted); font-size: clamp(1rem, 3vw, 1.15rem); max-width: 650px; margin: 0 auto 40px; }

        /* SEARCH */
        .search-box { 
            display: flex; background: #fff; border-radius: 100px; padding: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); max-width: 600px; margin: 0 auto 60px;
            border: 1px solid #e2e8f0;
        }
        .search-box input { border: none; flex: 1; padding: 0 20px; outline: none; font-size: 1rem; background: transparent; width: 100%; }
        .search-btn { background: var(--c-blue); color: white; border: none; padding: 14px 28px; border-radius: 100px; font-weight: 700; cursor: pointer; }

        /* STATS */
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }
        .stat-card { padding: 30px 15px; border-radius: 24px; color: white; text-align: center; transition: var(--transition); }
        .stat-card.blue { background: var(--c-blue); }
        .stat-card.green { background: var(--c-green); }
        .stat-card.gold { background: var(--c-orange); }
        .stat-card.red { background: var(--c-red); }
        .stat-num { font-size: 2.2rem; font-weight: 800; display: block; }
        .stat-label { font-size: 0.7rem; font-weight: 700; opacity: 0.9; text-transform: uppercase; }

        /* --- UPLOAD SECTION --- */
        .upload-section {
            background-color: var(--bg-deep); 
            padding: 80px 5%; 
            color: #fff;
            background-image: radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.1) 0%, transparent 40%);
        }
        .upload-container { max-width: 800px; margin: 0 auto; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); 
            border-radius: 30px;
            padding: 40px 30px;
        }
        .form-header { text-align: center; margin-bottom: 40px; }
        .form-header h2 { font-size: 2rem; font-weight: 800; margin-top: 10px; }
        
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--accent-gold); margin-bottom: 8px; text-transform: uppercase; }
        
        .input {
            width: 100%; padding: 15px 20px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 12px; color: #fff;
            font-size: 1rem; transition: var(--transition);
        }
        .input:focus { border-color: var(--c-blue); outline: none; background: rgba(255,255,255,0.1); }

        .file-upload-wrapper {
            border: 2px dashed rgba(255,255,255,0.2); padding: 30px; border-radius: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .file-upload-wrapper:hover { border-color: var(--c-blue); background: rgba(255,255,255,0.02); }

        .btn-primary {
            width: 100%; padding: 18px; background: var(--c-blue); color: white;
            border: none; border-radius: 15px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }

        /* RESPONSIVE OVERRIDES */
        @media (max-width: 768px) {
            .nav-links { display: none; } /* In a real app, swap for a hamburger menu */
            .hero { padding: 60px 5%; }
            .search-box { flex-direction: column; border-radius: 20px; gap: 10px; background: transparent; box-shadow: none; border: none; }
            .search-box input { background: white; padding: 15px; border-radius: 50px; border: 1px solid #e2e8f0; }
            .stats { grid-template-columns: 1fr 1fr; }
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="#" class="brand">
            <div class="brand-icon"><i class="fas fa-bolt"></i></div>
            <span class="brand-name">RUNnotes</span>
        </a>
        <div class="nav-links">
            <a href="#">Resources</a>
            <a href="#">Community</a>
            <a href="#" class="cta-nav">Login</a>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <span class="badge" data-aos="fade-down">The Engineering Standard</span>
            <h1 class="main-title" data-aos="fade-up">Elevate Your<br>Learning Curve.</h1>
            <p class="sub-text" data-aos="fade-up" data-aos-delay="100">Verified university lecture notes, blueprints, and past questions at your fingertips.</p>
            
            <div class="search-box" data-aos="zoom-in" data-aos-delay="200">
                <input type="text" placeholder="Search course (e.g. MEE 301)...">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>

            <div class="stats">
                <div class="stat-card blue" data-aos="fade-up" data-aos-delay="300">
                    <span class="stat-num">15k+</span>
                    <span class="stat-label">Resources</span>
                </div>
                <div class="stat-card green" data-aos="fade-up" data-aos-delay="400">
                    <span class="stat-num">98%</span>
                    <span class="stat-label">Success</span>
                </div>
                <div class="stat-card gold" data-aos="fade-up" data-aos-delay="500">
                    <span class="stat-num">4.9</span>
                    <span class="stat-label">Rating</span>
                </div>
                <div class="stat-card red" data-aos="fade-up" data-aos-delay="600">
                    <span class="stat-num">24/7</span>
                    <span class="stat-label">Access</span>
                </div>
            </div>
        </div>
    </header>

    <section class="upload-section">
        <div class="upload-container" data-aos="fade-up">
            <div class="glass-card">
                <div class="form-header">
                    <span class="label">Contribution</span>
                    <h2>Upload to Library</h2>
                </div>
                
                <form id="uploadForm">
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="label">Course Code</label>
                            <input type="text" id="cCode" class="input" placeholder="MEE 301" required>
                        </div>
                        <div class="form-group">
                            <label class="label">Department</label>
                            <select id="cDept" class="input">
                                <option>Computer Engineering</option>
                                <option>Mechanical Engineering</option>
                                <option>Civil Engineering</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label">Course Title</label>
                        <input type="text" id="cTitle" class="input" placeholder="Fluid Mechanics II" required>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="label">Level</label>
                            <select id="cLevel" class="input">
                                <option value="300">300 Level</option>
                                <option value="400">400 Level</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="label">Type</label>
                            <select id="cType" class="input">
                                <option value="note">Lecture Note</option>
                                <option value="pq">Past Questions</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label">File (PDF/JPG)</label>
                        <div class="file-upload-wrapper" onclick="document.getElementById('cFile').click()">
                            <i class="fas fa-cloud-upload-alt" style="font-size: 2rem; color: var(--c-blue); margin-bottom: 10px; display: block;"></i>
                            <p id="fileNameDisplay">Tap to select file</p>
                            <input type="file" id="cFile" hidden accept=".pdf,.jpg,.png,.jpeg">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" id="submitBtn">
                        SUBMIT FOR REVIEW
                    </button>
                    <p id="statusMsg" style="text-align: center; margin-top: 15px; font-size: 0.85rem;"></p>
                </form>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        const SB_URL = "https://fnsqjuczwqddatrkvffk.supabase.co";
        const SB_KEY = "sb_publishable_2zyetrB8vPucTpYziINyxw_RfwrJuF_"; 
        const _client = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('cFile').addEventListener('change', (e) => {
            document.getElementById('fileNameDisplay').innerText = e.target.files[0]?.name || "Tap to select file";
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMsg');
            const file = document.getElementById('cFile').files[0];

            if(!file) return alert("Select a file");

            btn.disabled = true;
            btn.innerText = 'UPLOADING...';
            
            try {
                const path = `vault/${Date.now()}_${file.name}`;
                const { error: sErr } = await _client.storage.from('note-files').upload(path, file);
                if(sErr) throw sErr;

                const { data: urlData } = _client.storage.from('note-files').getPublicUrl(path);

                await _client.from('submissions').insert([{
                    course_code: document.getElementById('cCode').value.toUpperCase(),
                    course_title: document.getElementById('cTitle').value,
                    department: document.getElementById('cDept').value,
                    level: document.getElementById('cLevel').value,
                    resource_type: document.getElementById('cType').value,
                    file_url: urlData.publicUrl
                }]);

                status.style.color = "var(--c-green)";
                status.innerText = "✓ Upload Successful!";
                document.getElementById('uploadForm').reset();
            } catch (err) {
                status.style.color = "var(--c-red)";
                status.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
                btn.innerText = 'SUBMIT FOR REVIEW';
            }
        });
    </script>
</body>
</html>
