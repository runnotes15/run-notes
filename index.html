<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNnotes | Basic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --red: #e11d48;
            --dark: #020617;
            --gray: #94a3b8;
            --card: #0f172a;
        }

        body {
            background: var(--dark);
            color: white;
            font-family: sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(2, 6, 23, 0.9);
            position: sticky;
            top: 0;
            border-bottom: 1px solid #1e293b;
        }

        .logo { font-size: 1.5rem; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: var(--red); }

        header {
            padding: 80px 5%;
            text-align: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, var(--dark) 70%);
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        h1 span { color: var(--red); }

        section { padding: 60px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #1e293b;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
        }

        .card:hover { border-color: var(--red); transform: translateY(-5px); }
        .card i { color: var(--red); font-size: 2rem; margin-bottom: 15px; }
        
        /* Loading Style */
        .loading-text {
            color: var(--red);
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid #1e293b;
            color: var(--gray);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">RUN<span>notes.</span></a>
    </nav>

    <header>
        <h1>Your Study <span>Superpower</span></h1>
        <p>Verified lecture notes and past questions.</p>
    </header>

    <section>
        <h2>Select Faculty</h2>
        <div class="grid">
            <div class="card clickable-card">
                <i class="fas fa-cog"></i>
                <h3>Engineering</h3>
                <p>Blueprints and technical notes.</p>
            </div>
            <div class="card clickable-card">
                <i class="fas fa-flask"></i>
                <h3>Sciences</h3>
                <p>Computer Science & Microbiology.</p>
            </div>
            <div class="card clickable-card">
                <i class="fas fa-balance-scale"></i>
                <h3>Law</h3>
                <p>Vetted legal case records.</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 RUNnotes. Built for Academic Growth.</p>
    </footer>

    <script>
        // Select all cards with the 'clickable-card' class
        const cards = document.querySelectorAll('.clickable-card');

        cards.forEach(card => {
            card.addEventListener('click', function() {
                // Replace the card content with a loading message
                this.innerHTML = `
                    <div class="loading-text">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span>Loading...</span>
                    </div>
                `;
                
                // Optional: Redirect to another page after a short delay
                // setTimeout(() => { window.location.href = 'your-page.html'; }, 1000);
            });
        });
    </script>

</body>
</html>
