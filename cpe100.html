<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNnotes | 100 Level CPE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050a30;
            --accent: #e02030;
            --gold: #ffc107;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 100% 100%, rgba(224, 32, 48, 0.1) 0%, transparent 40%);
            color: var(--white);
            padding: 40px 5%;
            min-height: 100vh;
        }

        .nav-back { margin-bottom: 20px; display: inline-block; color: var(--gold); text-decoration: none; font-size: 0.9rem; font-weight: 600; }

        .header { margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; }
        .header h1 span { color: var(--accent); }
        .header p { color: #b0bec5; margin-top: 5px; }

        .semester-section { margin-bottom: 60px; }
        .semester-title { 
            font-size: 1.5rem; font-weight: 800; color: var(--gold); 
            border-left: 4px solid var(--accent); padding-left: 15px; margin-bottom: 25px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .category-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .category-card h3 { 
            font-size: 1.1rem; margin-bottom: 15px; color: var(--white); 
            display: flex; align-items: center; gap: 10px;
        }

        .resource-list { list-style: none; }
        .resource-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .resource-item:last-child { border: none; }
        
        .resource-link { 
            text-decoration: none; color: #b0bec5; font-size: 0.9rem; 
            transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .resource-link:hover { color: var(--white); transform: translateX(5px); }
        .resource-link i { color: var(--accent); font-size: 0.8rem; }

        .code-badge { 
            font-size: 0.7rem; background: rgba(255,255,255,0.05); 
            padding: 2px 8px; border-radius: 4px; color: var(--gold);
        }

        .loading { text-align: center; padding: 50px; opacity: 0.5; }
    </style>
</head>
<body>

    <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> Back to Hub</a>

    <div class="header">
        <h1>100<span>Level</span></h1>
        <p>Computer Engineering Archive</p>
    </div>

    <div id="content-area">
        <div class="loading">
            <i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Syncing Archive...
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCU6Tft4hLcLizWcqwfK0Z7fmyVcrkTttg",
        authDomain: "runnotes.firebaseapp.com",
        projectId: "runnotes",
        storageBucket: "runnotes.firebasestorage.app",
        messagingSenderId: "479090481066",
        appId: "1:479090481066:web:488d8bdbd5e4f954273dd3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Query for 100L resources specifically, sorted alphabetically by code
    const q = query(
        collection(db, "resources"), 
        where("level", "==", "100"), 
        orderBy("code", "asc")
    );

    onSnapshot(q, (snapshot) => {
        const area = document.getElementById('content-area');
        if (snapshot.empty) {
            area.innerHTML = "<p style='text-align:center; opacity:0.5;'>No resources uploaded for 100L yet.</p>";
            return;
        }

        // Initialize sorting buckets
        const data = {
            sem1: { notes: [], pqs: [] },
            sem2: { notes: [], pqs: [] }
        };

        snapshot.forEach(docSnap => {
            const item = docSnap.data();
            const targetSem = item.semester == 1 ? 'sem1' : 'sem2';
            const targetType = item.type === 'note' ? 'notes' : 'pqs';
            data[targetSem][targetType].push(item);
        });

        area.innerHTML = `
            ${renderSemester("FIRST SEMESTER", data.sem1)}
            ${renderSemester("SECOND SEMESTER", data.sem2)}
        `;
    });

    function renderSemester(title, semData) {
        return `
            <div class="semester-section">
                <h2 class="semester-title">${title}</h2>
                <div class="category-grid">
                    <div class="category-card">
                        <h3><i class="fas fa-book"></i> Lecture Notes</h3>
                        <div class="resource-list">
                            ${semData.notes.length ? semData.notes.map(n => renderItem(n)).join('') : '<p style="font-size:0.8rem; opacity:0.3;">No notes yet</p>'}
                        </div>
                    </div>

                    <div class="category-card">
                        <h3><i class="fas fa-file-signature"></i> Past Questions</h3>
                        <div class="resource-list">
                            ${semData.pqs.length ? semData.pqs.map(p => renderItem(p)).join('') : '<p style="font-size:0.8rem; opacity:0.3;">No PQs yet</p>'}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderItem(item) {
        return `
            <div class="resource-item">
                <a href="${item.url}" target="_blank" class="resource-link">
                    <i class="fas fa-file-pdf"></i>
                    <span>${item.title}</span>
                </a>
                <span class="code-badge">${item.code}</span>
            </div>
        `;
    }
</script>
</body>
</html>
