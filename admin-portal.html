<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNnotes | Admin Command Center</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050a30;
            --accent: #e02030;
            --gold: #ffc107;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --white: #ffffff;
            --textbook: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(224, 32, 48, 0.1) 0%, transparent 40%);
            color: var(--white);
            padding: 40px 5%;
            min-height: 100vh;
        }

        .header { margin-bottom: 40px; }
        .header h1 { font-size: 2rem; font-weight: 800; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-card h3 { font-size: 2rem; color: var(--white); }
        .stat-card p { font-size: 0.7rem; color: var(--gold); font-weight: 700; margin-top: 5px; }

        .main-layout {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 40px;
            align-items: start;
        }

        .glass-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            position: sticky;
            top: 20px;
        }
        .glass-card h2 { font-size: 1.2rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .glass-card h2 i { color: var(--accent); }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #b0bec5; margin-bottom: 5px; }
        input, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border); border-radius: 10px;
            color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }
        select:disabled { opacity: 0.3; cursor: not-allowed; background: rgba(255,255,255,0.05); }

        .btn-add {
            width: 100%; padding: 15px; background: var(--accent);
            color: white; border: none; border-radius: 10px;
            font-weight: 800; cursor: pointer; margin-top: 10px;
            transition: 0.3s;
        }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(224, 32, 48, 0.3); }
        .btn-add:disabled { background: #555; cursor: not-allowed; transform: none; }

        .archive-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; position: sticky; top: 0; background: var(--bg);
            padding: 10px 0; z-index: 100;
        }
        .search-bar { width: 100%; position: relative; }
        .search-bar i { position: absolute; left: 15px; top: 14px; color: #b0bec5; }
        .search-bar input { padding-left: 45px; border-radius: 50px; }

        .scroll-area { max-height: 80vh; overflow-y: auto; padding-right: 10px; }
        
        .resource-row {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 16px; margin-bottom: 12px;
            transition: 0.3s;
        }
        .resource-row:hover { border-color: var(--gold); background: rgba(255,255,255,0.06); }

        .info b { font-size: 1.1rem; display: block; margin-bottom: 5px; }
        .info span { font-size: 0.75rem; color: #b0bec5; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .badge {
            font-size: 0.65rem; padding: 3px 10px; border-radius: 6px;
            background: rgba(255,255,255,0.08); color: var(--gold); border: 1px solid rgba(255, 193, 7, 0.2);
        }

        .btn-delete {
            background: rgba(224, 32, 48, 0.1); color: var(--accent);
            border: 1px solid var(--accent); width: 45px; height: 45px;
            border-radius: 12px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-delete:hover { background: var(--accent); color: white; }

        @media (max-width: 900px) { 
            .main-layout { grid-template-columns: 1fr; } 
            .glass-card { position: static; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>RUN<span>notes</span></h1>
        <p>Master Control Panel</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3 id="total-count">0</h3><p>Total Archives</p></div>
        <div class="stat-card"><h3 id="note-count">0</h3><p>Lecture Notes</p></div>
        <div class="stat-card"><h3 id="pq-count">0</h3><p>Past Questions</p></div>
        <div class="stat-card"><h3 id="book-count">0</h3><p>Textbooks</p></div>
    </div>

    <div class="main-layout">
        <div class="glass-card">
            <h2><i class="fas fa-plus-circle"></i> Add New Resource</h2>
            
            <div class="form-group">
                <label>Course Title</label>
                <input type="text" id="title" placeholder="e.g. Vector Calculus">
            </div>

            <div class="form-group">
                <label>Course Code</label>
                <input type="text" id="code" placeholder="CPE 312">
            </div>

<div class="form-group">
    <label>Department / Category</label>
    <select id="dept">
        <option value="General Studies">General Courses (GST/MTH/PHY)</option>
        
        <option value="Computer Engineering">Computer Engineering</option>
        <option value="Civil Engineering">Civil Engineering</option>
        <option value="Electrical Engineering">Electrical Engineering</option>
        <option value="Mechanical Engineering">Mechanical Engineering</option>
        
        <option value="Textbook">-- TEXTBOOK --</option>
    </select>
</div>



            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1">
                    <label>Level</label>
                    <select id="level">
                        <option value="100">100L</option>
                        <option value="200">200L</option>
                        <option value="300">300L</option>
                        <option value="400">400L</option>
                        <option value="500">500L</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1">
                    <label>Semester</label>
                    <select id="sem">
                        <option value="1">1st Sem</option>
                        <option value="2">2nd Sem</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label id="typeLabel">Resource Type</label>
                <select id="type">
                    <option value="note">Lecture Note</option>
                    <option value="pq">Past Question</option>
                    <option value="textbook" style="display:none;">Textbook</option>
                </select>
            </div>

            <div class="form-group">
                <label>Access Link</label>
                <input type="url" id="url" placeholder="https://drive.google.com/...">
            </div>

            <button class="btn-add" id="publishBtn">PUBLISH TO ARCHIVE</button>
        </div>

        <div>
            <div class="archive-header">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" placeholder="Search archives by code or title...">
                </div>
            </div>

            <div id="master-list" class="scroll-area">
                <div style="text-align:center; padding:100px; opacity:0.5;">
                    <i class="fas fa-sync fa-spin"></i><br><br>Syncing...
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCU6Tft4hLcLizWcqwfK0Z7fmyVcrkTttg",
        authDomain: "runnotes.firebaseapp.com",
        projectId: "runnotes",
        storageBucket: "runnotes.firebasestorage.app",
        messagingSenderId: "479090481066",
        appId: "1:479090481066:web:488d8bdbd5e4f954273dd3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const resourcesCol = collection(db, "resources");

    // UI Logic for Textbook Selection
const deptSelect = document.getElementById('dept');
const typeSelect = document.getElementById('type');
const typeLabel = document.getElementById('typeLabel');

deptSelect.onchange = () => {
    if(deptSelect.value === 'Textbook') {
        // Force and disable for Textbooks
        typeSelect.value = 'textbook';
        typeSelect.disabled = true;
        typeLabel.innerHTML = 'Resource Type <span style="color:var(--textbook); font-size:0.6rem;">(AUTOMATIC)</span>';
    } else {
        // Enable for General Studies and all Engineering depts
        typeSelect.disabled = false;
        // If it was stuck on textbook from a previous click, reset it to Note
        if(typeSelect.value === 'textbook') {
            typeSelect.value = 'note';
        }
        typeLabel.innerText = 'Resource Type';
    }
};

    // Realtime Sync
    const q = query(resourcesCol, orderBy("code", "asc"));
    onSnapshot(q, (snapshot) => {
        const list = document.getElementById('master-list');
        let html = "";
        let counts = { total: 0, notes: 0, pqs: 0, books: 0 };

        snapshot.forEach(docSnap => {
            const d = docSnap.data();
            const id = docSnap.id;
            counts.total++;
            
            let typeColor = '#e02030';
            let typeLabel = 'NOTE';

            if(d.type === 'note') {
                counts.notes++;
            } else if(d.type === 'pq') {
                counts.pqs++;
                typeColor = '#ffc107';
                typeLabel = 'PAST QUESTION';
            } else {
                counts.books++;
                typeColor = '#00d2ff';
                typeLabel = 'TEXTBOOK';
            }

            html += `
                <div class="resource-row" data-search="${d.code} ${d.title}">
                    <div class="info">
                        <b>${d.code.toUpperCase()}: ${d.title}</b>
                        <span>
                            <span class="badge">${d.level}L</span>
                            <span class="badge">SEM ${d.semester}</span>
                            <span class="badge" style="color:${typeLabel === 'PAST QUESTION' ? 'black' : 'white'}; background: ${typeColor}">${typeLabel}</span>
                            <span style="color:#777;">|</span> ${d.dept}
                        </span>
                    </div>
                    <button class="btn-delete" onclick="deleteResource('${id}')">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>`;
        });
        
        list.innerHTML = html || "<div style='text-align:center; padding:50px; color:#777;'>No resources found.</div>";
        document.getElementById('total-count').innerText = counts.total;
        document.getElementById('note-count').innerText = counts.notes;
        document.getElementById('pq-count').innerText = counts.pqs;
        document.getElementById('book-count').innerText = counts.books;
    });

    // Upload Logic
    document.getElementById('publishBtn').onclick = async () => {
        const btn = document.getElementById('publishBtn');
        let rawUrl = document.getElementById('url').value.trim();
        let finalUrl = rawUrl;

        // Drive URL Sanitizer
        if (rawUrl.includes('drive.google.com')) {
            const fileId = rawUrl.split('/d/')[1]?.split('/')[0];
            if (fileId) finalUrl = `https://drive.google.com/uc?export=view&id=${fileId}`;
        }

        const data = {
            title: document.getElementById('title').value.trim(),
            code: document.getElementById('code').value.trim().toUpperCase(),
            dept: document.getElementById('dept').value,
            level: document.getElementById('level').value,
            semester: parseInt(document.getElementById('sem').value),
            type: typeSelect.value,
            url: finalUrl,
            timestamp: new Date()
        };

        if(!data.title || !data.code || !data.url) return alert("Missing required fields!");

        try {
            btn.disabled = true;
            btn.innerText = "PUBLISHING...";
            await addDoc(resourcesCol, data);
            document.getElementById('title').value = "";
            document.getElementById('code').value = "";
            document.getElementById('url').value = "";
            alert("Archive Updated!");
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "PUBLISH TO ARCHIVE";
        }
    };

    window.deleteResource = async (id) => {
        if(confirm("Permanently delete this resource?")) {
            await deleteDoc(doc(db, "resources", id));
        }
    }

    document.getElementById('search').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.resource-row').forEach(row => {
            row.style.display = row.getAttribute('data-search').toLowerCase().includes(term) ? 'flex' : 'none';
        });
    };
</script>
</body>
</html>
