<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNnotes V2.5 | Engineering Repository</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ── SYSTEM VARIABLES ── */
        :root {
            --bg-deep: #030712;
            --bg-card: #0f172a;
            --bg-card-alt: #1e293b;
            --primary: #e11d48;
            --primary-glow: rgba(225, 29, 72, 0.4);
            --secondary: #334155;
            --accent-gold: #fbbf24;
            --text-high: #f8fafc;
            --text-mid: #94a3b8;
            --text-low: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(15, 23, 42, 0.8);
            --nav-height: 75px;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── RESET & BASE ── */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(225, 29, 72, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            color: var(--text-high);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── NAVIGATION ── */
        .navbar {
            position: fixed; top: 0; width: 100%; height: var(--nav-height);
            background: var(--glass); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 5000;
            display: flex; align-items: center;
        }

        .nav-inner {
            width: 90%; max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand {
            font-size: 1.6rem; font-weight: 800; letter-spacing: -1px;
            text-decoration: none; color: var(--text-high);
        }
        .brand span { color: var(--primary); }

        .nav-status {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.75rem; font-weight: 700; color: var(--text-low);
        }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }

        /* ── HERO SECTION ── */
        .hero {
            padding: 160px 5% 60px; text-align: center;
            max-width: 900px; margin: 0 auto;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 7vw, 4rem); font-weight: 800;
            line-height: 1.1; margin-bottom: 20px; letter-spacing: -2px;
        }

        .hero h1 span {
            background: linear-gradient(to right, #fff, var(--text-low));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero p { color: var(--text-mid); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

        /* ── DEPARTMENT NAVIGATION ── */
        .sticky-wrap {
            position: sticky; top: var(--nav-height); z-index: 4000;
            background: rgba(3, 7, 18, 0.8); backdrop-filter: blur(10px);
            padding: 15px 0; border-bottom: 1px solid var(--border);
        }

        .dept-pills {
            display: flex; justify-content: center; gap: 10px;
            overflow-x: auto; padding: 0 20px; scrollbar-width: none;
        }
        .dept-pills::-webkit-scrollbar { display: none; }

        .pill {
            padding: 10px 24px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 100px; color: var(--text-mid); text-decoration: none;
            font-size: 0.85rem; font-weight: 600; white-space: nowrap; transition: var(--transition);
        }
        .pill:hover, .pill.active {
            background: var(--primary); color: #fff; border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow); transform: translateY(-2px);
        }

        /* ── MAIN CONTENT ── */
        .main-container { width: 90%; max-width: 1100px; margin: 60px auto; }

        .dept-section { margin-bottom: 80px; scroll-margin-top: 180px; }

        .section-header { margin-bottom: 30px; }
        .section-header h2 { font-size: 2.2rem; font-weight: 800; }
        .section-header p { color: var(--accent-gold); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* ── THE ACCORDION ── */
        .lvl-box {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 20px; margin-bottom: 16px; overflow: hidden;
            transition: var(--transition);
        }

        .lvl-box:hover { border-color: var(--secondary); }

        .lvl-box.open { border-color: var(--primary); box-shadow: var(--shadow-lg); }

        .lvl-trigger {
            width: 100%; padding: 25px 35px; background: none; border: none;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            text-align: left; color: var(--text-high);
        }

        .lvl-info h3 { font-size: 1.4rem; font-weight: 800; }
        .lvl-info span { font-size: 0.75rem; color: var(--text-low); font-weight: 600; text-transform: uppercase; }

        .lvl-icon {
            width: 45px; height: 45px; background: rgba(255,255,255,0.03);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }
        .open .lvl-icon { background: var(--primary); transform: rotate(180deg); color: #fff; }

        /* ── ACCORDION CONTENT ── */
        .lvl-content {
            max-height: 0; overflow: hidden; transition: max-height 0.6s ease;
            background: rgba(0,0,0,0.2);
        }
        .open .lvl-content { max-height: 2000px; padding: 0 35px 40px; border-top: 1px solid var(--border); }

        .semester-layout {
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px;
        }

        .sem-column h4 {
            font-size: 1rem; font-weight: 800; text-transform: uppercase;
            padding-bottom: 12px; border-bottom: 2px solid var(--primary);
            margin-bottom: 25px; display: flex; align-items: center; gap: 10px;
        }

        /* ── RESOURCE CARDS ── */
        .res-type {
            font-size: 0.7rem; font-weight: 800; color: var(--text-low);
            text-transform: uppercase; margin: 20px 0 10px; display: block;
        }

        .res-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-card-alt); padding: 18px 22px; border-radius: 14px;
            margin-bottom: 10px; text-decoration: none; border: 1px solid transparent;
            transition: var(--transition);
        }

        .res-item:hover {
            border-color: var(--primary); background: rgba(225, 29, 72, 0.05);
            transform: translateX(10px);
        }

        .res-meta b { color: var(--accent-gold); font-family: 'JetBrains Mono', monospace; font-size: 0.95rem; margin-right: 15px; }
        .res-meta span { color: var(--text-high); font-weight: 600; font-size: 0.9rem; }
        
        .res-arrow { color: var(--text-low); font-size: 0.9rem; transition: var(--transition); }
        .res-item:hover .res-arrow { color: var(--primary); transform: rotate(-45deg); }

        /* ── FOOTER ── */
        footer { padding: 80px 0 40px; text-align: center; border-top: 1px solid var(--border); margin-top: 100px; }
        .footer-logo { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .footer-logo span { color: var(--primary); }
        .copy { font-size: 0.8rem; color: var(--text-low); letter-spacing: 1px; }

        /* ── ANIMATIONS ── */
        .loading-spin { text-align: center; padding: 40px; color: var(--primary); }
        .empty-state { text-align: center; padding: 30px; color: var(--text-low); font-style: italic; }

        @media (max-width: 900px) {
            .semester-layout { grid-template-columns: 1fr; }
            .lvl-trigger { padding: 20px; }
            .open .lvl-content { padding: 0 20px 30px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="#" class="brand">RUN<span>notes</span></a>
            <div class="nav-status">
                <div class="status-dot"></div> REDEEMER'S CLOUD V2.5
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1><span>Engineering</span> Excellence Digitalized.</h1>
        <p>A streamlined repository for notes, past questions, and technical resources curated for the modern engineer.</p>
    </header>

    <div class="sticky-wrap">
        <div class="dept-pills" id="pill-box"></div>
    </div>

    <main class="main-container" id="app-root"></main>

    <footer>
        <div class="footer-logo">RUN<span>notes</span></div>
        <p class="copy">&copy; 2026 RUN FACULTY OF ENGINEERING. ALL RIGHTS RESERVED.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2iAdjlI8rNocAucU5hDmEjFKMFHqxhEE",
            authDomain: "eduworld-3849f.firebaseapp.com",
            projectId: "eduworld-3849f",
            storageBucket: "eduworld-3849f.firebasestorage.app",
            messagingSenderId: "163283173732",
            appId: "1:163283173732:web:4a228cd4c5c4772cbe3a71"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const DEPTS = [
            { id: "computer", name: "Computer Engineering", code: "CPE" },
            { id: "civil", name: "Civil Engineering", code: "CVE" },
            { id: "electrical", name: "Electrical Engineering", code: "EEE" },
            { id: "mechanical", name: "Mechanical Engineering", code: "MEE" }
        ];

        const LEVELS = ["100", "200", "300", "400", "500"];

        // ── INIT UI ──
        const root = document.getElementById('app-root');
        const pillBox = document.getElementById('pill-box');

        DEPTS.forEach(dept => {
            // Pill
            const p = document.createElement('a');
            p.href = `#${dept.id}`;
            p.className = 'pill';
            p.textContent = dept.name;
            pillBox.appendChild(p);

            // Section
            const sec = document.createElement('section');
            sec.id = dept.id;
            sec.className = 'dept-section';
            sec.innerHTML = `
                <div class="section-header">
                    <p>${dept.code} Department</p>
                    <h2>${dept.name}</h2>
                </div>
                <div class="lvl-list">
                    ${LEVELS.map(l => `
                        <div class="lvl-box" id="box-${dept.id}-${l}">
                            <button class="lvl-trigger" onclick="toggleView('${l}', '${dept.name}', 'box-${dept.id}-${l}')">
                                <div class="lvl-info">
                                    <span>Session Progression</span>
                                    <h3>${l} Level Resources</h3>
                                </div>
                                <div class="lvl-icon"><i class="fas fa-chevron-down"></i></div>
                            </button>
                            <div class="lvl-content"></div>
                        </div>
                    `).join('')}
                </div>
            `;
            root.appendChild(sec);
        });

        // ── CORE LOGIC ──
        window.toggleView = async (level, deptName, boxId) => {
            const box = document.getElementById(boxId);
            const content = box.querySelector('.lvl-content');
            
            const isOpen = box.classList.toggle('open');
            if (!isOpen) return;

            // Prevent double load
            if (content.getAttribute('data-full') === 'true') return;

            content.innerHTML = `<div class="loading-spin"><i class="fas fa-spinner fa-spin fa-2x"></i></div>`;

            try {
                const q = query(collection(db, "resources"), 
                    where("level", "==", level), 
                    where("dept", "==", deptName)
                );
                
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    content.innerHTML = `<div class="empty-state">No materials found for this level yet.</div>`;
                    content.setAttribute('data-full', 'true');
                    return;
                }

                const data = {
                    s1: { notes: [], pqs: [] },
                    s2: { notes: [], pqs: [] }
                };

                snap.forEach(doc => {
                    const r = doc.data();
                    const sem = r.semester == "2" ? 's2' : 's1';
                    if (r.type === 'pq') data[sem].pqs.push(r); else data[sem].notes.push(r);
                });

                // Strict Alphabetical Sort
                const sorter = (a, b) => (a.code || "").localeCompare(b.code || "", undefined, {numeric: true});
                [data.s1.notes, data.s1.pqs, data.s2.notes, data.s2.pqs].forEach(arr => arr.sort(sorter));

                content.innerHTML = `
                    <div class="semester-layout">
                        <div class="sem-column">
                            <h4><i class="fas fa-sun"></i> First Semester</h4>
                            ${renderList(data.s1.notes, 'Lecture Notes')}
                            ${renderList(data.s1.pqs, 'Past Questions')}
                        </div>
                        <div class="sem-column">
                            <h4><i class="fas fa-moon"></i> Second Semester</h4>
                            ${renderList(data.s2.notes, 'Lecture Notes')}
                            ${renderList(data.s2.pqs, 'Past Questions')}
                        </div>
                    </div>
                `;
                content.setAttribute('data-full', 'true');

            } catch (err) {
                content.innerHTML = `<div class="empty-state">Connection failed. Please refresh.</div>`;
            }
        };

        function renderList(items, typeLabel) {
            if (items.length === 0) return "";
            return `
                <span class="res-type">${typeLabel}</span>
                ${items.map(i => `
                    <a href="${i.url}" target="_blank" class="res-item">
                        <div class="res-meta"><b>${i.code}</b> <span>${i.title}</span></div>
                        <i class="fas fa-arrow-right res-arrow"></i>
                    </a>
                `).join('')}
            `;
        }

        // Active Pill Script
        window.addEventListener('scroll', () => {
            let current = "";
            document.querySelectorAll('.dept-section').forEach(s => {
                const top = s.offsetTop;
                if (pageYOffset >= top - 250) current = s.getAttribute('id');
            });
            document.querySelectorAll('.pill').forEach(p => {
                p.classList.remove('active');
                if (p.getAttribute('href').includes(current)) p.classList.add('active');
            });
        });
    </script>
</body>
</html>
