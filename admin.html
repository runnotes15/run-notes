<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNnotes | Admin Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050a30;
            --accent: #e02030;
            --gold: #ffc107;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --white: #ffffff;
            --success: #4ade80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 0% 0%, rgba(224, 32, 48, 0.1) 0%, transparent 40%);
            color: var(--white);
            padding: 40px 5%;
            min-height: 100vh;
        }

        .header { margin-bottom: 40px; text-align: left; }
        .header h1 { font-size: 2rem; font-weight: 800; }
        .header h1 span { color: var(--accent); }
        .header p { color: var(--gold); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-card h3 { font-size: 1.8rem; color: var(--white); }
        .stat-card p { font-size: 0.65rem; color: var(--gold); font-weight: 700; text-transform: uppercase; margin-top: 5px; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .column-header h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); }

        .resource-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 15px;
            transition: 0.3s;
            animation: fadeIn 0.5s ease-out;
        }
        .resource-card:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

        .card-info b { font-size: 1rem; display: block; margin-bottom: 5px; color: var(--white); }
        .card-info span { font-size: 0.75rem; color: #b0bec5; display: block; margin-bottom: 10px; }
        
        .badge-row { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .badge {
            font-size: 0.6rem; padding: 4px 10px; border-radius: 6px;
            background: rgba(255,255,255,0.08); color: var(--gold); border: 1px solid rgba(255, 193, 7, 0.2);
            font-weight: 700;
        }

        .action-row { display: flex; gap: 10px; }
        .btn {
            flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: 800; 
            font-size: 0.75rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-view { background: rgba(255,255,255,0.1); color: white; text-decoration: none; }
        .btn-approve { background: var(--success); color: #050a30; }
        .btn-delete { background: rgba(224, 32, 48, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        
        .btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .scroll-area { max-height: 70vh; overflow-y: auto; padding-right: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>RUN<span>notes</span></h1>
        <p>Master Control Panel</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3 id="stat-pending">0</h3><p>Pending</p></div>
        <div class="stat-card"><h3 id="stat-approved">0</h3><p>Approved</p></div>
        <div class="stat-card"><h3 id="stat-total">0</h3><p>Total Assets</p></div>
    </div>

    <div class="main-layout">
        <div>
            <div class="column-header">
                <h2><i class="fas fa-clock"></i> Pending Review</h2>
            </div>
            <div id="pending-list" class="scroll-area">
                </div>
        </div>

        <div>
            <div class="column-header">
                <h2><i class="fas fa-check-circle"></i> Live Archive</h2>
            </div>
            <div id="approved-list" class="scroll-area">
                </div>
        </div>
    </div>

<script>
    // --- SUPABASE CONFIG ---
    const SUPABASE_URL = "https://fnsqjuczwqddatrkvffk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_2zyetrB8vPucTpYziINyxw_RfwrJuF_"; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Fetch and sync data
    async function syncDashboard() {
        const { data: submissions, error } = await _supabase
            .from('submissions')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Sync Error:", error);
            return;
        }

        renderList(submissions);
        updateStats(submissions);
    }

    function renderList(items) {
        const pendingList = document.getElementById('pending-list');
        const approvedList = document.getElementById('approved-list');
        
        pendingList.innerHTML = "";
        approvedList.innerHTML = "";

        items.forEach(item => {
            const card = `
                <div class="resource-card">
                    <div class="card-info">
                        <b>${item.course_code}: ${item.course_title}</b>
                        <span>Uploaded: ${new Date(item.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="badge-row">
                        <span class="badge">${item.level}L</span>
                        <span class="badge">${item.semester === '1' ? '1st Sem' : '2nd Sem'}</span>
                        <span class="badge" style="background: ${item.resource_type === 'note' ? 'var(--accent)' : 'var(--gold)'}; color: ${item.resource_type === 'note' ? 'white' : 'black'}">
                            ${item.resource_type.toUpperCase()}
                        </span>
                    </div>
                    <div class="action-row">
                        <a href="${item.file_url}" target="_blank" class="btn btn-view"><i class="fas fa-eye"></i> View</a>
                        ${!item.is_approved ? 
                            `<button onclick="approveItem(${item.id})" class="btn btn-approve"><i class="fas fa-check"></i> Approve</button>` : 
                            ''
                        }
                        <button onclick="deleteItem(${item.id})" class="btn btn-delete"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;

            if (item.is_approved) {
                approvedList.innerHTML += card;
            } else {
                pendingList.innerHTML += card;
            }
        });

        if (pendingList.innerHTML === "") pendingList.innerHTML = "<p style='opacity:0.5; text-align:center;'>No pending items.</p>";
    }

    function updateStats(items) {
        const pending = items.filter(i => !i.is_approved).length;
        const approved = items.filter(i => i.is_approved).length;
        document.getElementById('stat-pending').innerText = pending;
        document.getElementById('stat-approved').innerText = approved;
        document.getElementById('stat-total').innerText = items.length;
    }

    // --- ACTIONS ---

    window.approveItem = async (id) => {
        const { error } = await _supabase
            .from('submissions')
            .update({ is_approved: true })
            .eq('id', id);

        if (!error) syncDashboard();
    };

    window.deleteItem = async (id) => {
        if (!confirm("Are you sure you want to delete this submission?")) return;
        
        const { error } = await _supabase
            .from('submissions')
            .delete()
            .eq('id', id);

        if (!error) syncDashboard();
    };

    // Initial Load & Realtime Sync
    syncDashboard();
    
    // Subscribe to changes
    _supabase
        .channel('schema-db-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'submissions' }, () => {
            syncDashboard();
        })
        .subscribe();

</script>
</body>
</html>
